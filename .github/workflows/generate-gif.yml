name: Generate Commit Shooter Animation

on:
  schedule:
    - cron: '0 0 * * *' # Triggers automatically every night
  workflow_dispatch: # Allows you to force run it manually with a button click

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests Pillow

      - name: Run Animation Generator
        run: python generate_animation.py

      - name: Commit and Push Updated GIF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add commit_shooter.gif
          git commit -m "Update automated space shooter animation" || exit 0
          git push
