name: GitHub Tetris Contribution Grid

on:
  schedule:
    - cron: "0 0 * * *" # runs once a day
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: generate github-contribution-grid-tetris.svg
        uses: Platane/snk@v3
        with:
          github_user_name: aashichaubey
          outputs: |
            dist/github-contribution-grid-tetris.svg
            dist/github-contribution-grid-tetris-dark.svg?palette=github-dark

      - name: push github-contribution-grid-tetris.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
