name: Generate Space Shooter Game

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate Space Shooter GIF
        uses: czl9707/gh-space-shooter@main
        with:
          username: ${{ github.repository_owner }}
          github-token: ${{ secrets.GITHUB_TOKEN }} 
          output-path: 'gh-space-shooter.gif'
          
          # STEP 1: This draws the empty grid background so it matches your real calendar
          draw-blank-days: 'true' 
          
          # STEP 2: This makes the spaceship scan week-by-week straight to your real May/June commits
          strategy: 'column' 
          fps: '40'

