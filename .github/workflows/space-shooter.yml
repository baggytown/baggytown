name: Generate Space Shooter Game

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # FIX 1: Configures git identity so the machine can make the commit without crashing
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate Space Shooter GIF
        uses: czl9707/gh-space-shooter@main
        with:
          username: ${{ github.repository_owner }}
          # FIX 2: Explicitly passes the system token needed to grab your contribution data
          github-token: ${{ secrets.GITHUB_TOKEN }} 
          output-path: 'gh-space-shooter.gif'
          strategy: 'random'
          fps: '40'
